version: "3.9"

services:
  backend:
    build: ./backend
    container_name: myapp-backend
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: myapp-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
